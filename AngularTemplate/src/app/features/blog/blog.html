<div class="container my-5 pt-4">
    <div class="blog-header text-center">
        <h1 style="color: #5a4634; font-family: 'Bell MT', serif; font-weight: bold;">El Blog de Calin</h1>
        <p class="fs-5 text-muted mx-auto mt-3" style="max-width: 600px;">
            Noticias, curiosidades, recetas y todo lo que necesitas saber sobre el mundo del té, café y chocolate a granel.
        </p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" *ngFor="let post of posts">
            <div class="card h-100 border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <img [src]="post.image" class="card-img-top" alt="Blog post image" style="height: 200px; object-fit: cover;">
                <div class="card-body p-4 d-flex flex-column">
                    <small class="text-muted mb-2"><i class="bi bi-calendar3 me-2"></i>{{ post.date }}</small>
                    <h5 class="card-title fw-bold" style="color: #5a4634;">{{ post.title }}</h5>
                    <p class="card-text text-muted flex-grow-1">{{ post.excerpt }}</p>
                    <button class="btn btn-outline-dark align-self-start mt-3" style="border-radius: 20px;">Leer más</button>
                </div>
            </div>
        </div>
    </div>
</div>
