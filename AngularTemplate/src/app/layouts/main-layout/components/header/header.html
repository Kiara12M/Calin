<div class="border-bottom py-2 px-3 position-relative home-background" id="container-header">
    <div class="container-custom">
        <div class="d-flex align-items-center justify-content-between position-relative" style="min-height: 80px;">
            <!-- Izquierda: Vacío -->
            <div class="d-flex flex-row gap-4 align-items-center" style="z-index: 2;">
            </div>

            <!-- Centro Absoluto: Logo y Título CALIN -->
            <div class="position-absolute w-100 h-100 d-flex justify-content-center align-items-center gap-3" style="left: 0; top: 0; pointer-events: none;">
                <img class="logo" src="/logo2.2.png" alt="Logo" style="height: 80px; pointer-events: auto;">
                <h1 class="name-titulo mb-0" style="pointer-events: auto; font-size: 3rem;">CALIN COFFE & TEA</h1>
            </div>

            <!-- Derecha: Navegación -->
            <div class="d-flex gap-3 align-items-center justify-content-end" style="z-index: 2;">
                <nav class="navbar-expand-lg px-4 bg-transparent border-0">
                    <div class="ms-auto d-flex align-items-center gap-3 menu-links pt-1">
                        <i class="bi bi-house"></i>
                        <a class="nav-link" routerLink="/">Home</a>
                        
                        <ng-container *ngIf="!authService.isAuthenticated()">
                            <i class="bi bi-person-circle" style="cursor: pointer" routerLink="/login"></i>
                            <a class="nav-link gap-2" routerLink="/login">Perfil</a>
                        </ng-container>
                        
                        <ng-container *ngIf="authService.isAuthenticated()">
                            <i class="bi bi-box-seam" style="cursor: pointer" routerLink="/mis-pedidos"></i>
                            <a class="nav-link gap-2" routerLink="/mis-pedidos">Mis Pedidos</a>
                            <i class="bi bi-box-arrow-right" style="cursor: pointer" (click)="authService.logout()"></i>
                            <a class="nav-link gap-2" style="cursor: pointer" (click)="authService.logout()">Salir</a>
                        </ng-container>
                        
                        <div class="cart-icon-wrapper d-flex align-items-center gap-1 ms-2" (click)="onToggleCart()" style="cursor: pointer; position: relative;">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" *ngIf="cartService.cartItems().length > 0" style="font-size: 0.6rem;">
                                {{ cartService.cartItems().length }}
                            </span>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </div>
</div>
